name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-docs.yml
      - website/docs/**
  workflow_dispatch:
    inputs:
      environment:
        description: Wrangler environment to deploy
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/docs/package-lock.json

      - name: Install docs dependencies
        run: npm --prefix website/docs ci

      - name: Deploy docs to production
        if: ${{ github.event_name == 'push' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm --prefix website/docs run deploy:production

      - name: Deploy docs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOCS_ENV: ${{ inputs.environment }}
        run: npm --prefix website/docs run deploy:${DOCS_ENV}
