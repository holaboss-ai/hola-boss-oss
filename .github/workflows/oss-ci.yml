name: OSS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  desktop-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sdk/app-sdk/package-lock.json
            desktop/package-lock.json

      # Desktop consumes @holaboss/app-sdk via a file: dependency whose
      # exports map points at ./dist/*.d.ts. dist/ is gitignored, so the
      # SDK must be installed + built before desktop can be typechecked
      # or bundled. `desktop:prepare` chains both in the right order.
      - name: Prepare desktop (build SDK + install desktop deps)
        run: npm run desktop:prepare

      - name: Desktop typecheck
        run: npm run desktop:typecheck

  runtime-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            runtime/harness-host/package-lock.json
            runtime/state-store/package-lock.json

      - name: Install runtime state store dependencies
        run: npm --prefix runtime/state-store ci

      - name: Build runtime state store
        run: npm --prefix runtime/state-store run build

      - name: Install runtime harness host dependencies
        run: npm --prefix runtime/harness-host ci

      - name: Build runtime harness host
        run: npm --prefix runtime/harness-host run build

      - name: Runtime state store tests
        run: npm run runtime:state-store:test

      - name: Runtime harness host tests
        run: npm run runtime:harness-host:test

  sdk-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --cwd sdk/bridge

      - name: Run tests
        run: bun --cwd sdk/bridge run test

      - name: Build
        run: bun --cwd sdk/bridge run build

  sdk-app-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/app-sdk/package-lock.json

      - name: Install dependencies
        run: npm --prefix sdk/app-sdk ci

      - name: Typecheck
        run: npm --prefix sdk/app-sdk run typecheck

      - name: Run tests
        run: npm --prefix sdk/app-sdk run test

      - name: Build
        run: npm --prefix sdk/app-sdk run build

  runtime-api-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            runtime/api-server/package-lock.json
            runtime/state-store/package-lock.json

      - name: Install runtime API server dependencies
        run: npm --prefix runtime/api-server ci

      - name: Install runtime state store dependencies
        run: npm --prefix runtime/state-store ci

      - name: Build runtime state store
        run: npm --prefix runtime/state-store run build

      - name: Runtime API server typecheck
        run: npm --prefix runtime/api-server run typecheck

      - name: Runtime API server tests
        run: npm --prefix runtime/api-server run test

      - name: Runtime API server build
        run: npm --prefix runtime/api-server run build
