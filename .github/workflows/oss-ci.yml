name: OSS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  desktop-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm run desktop:install

      - name: Desktop typecheck
        run: npm run desktop:typecheck

  runtime-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            runtime/harness-host/package-lock.json
            runtime/state-store/package-lock.json

      - name: Install runtime state store dependencies
        run: npm --prefix runtime/state-store ci

      - name: Build runtime state store
        run: npm --prefix runtime/state-store run build

      - name: Install runtime harness host dependencies
        run: npm --prefix runtime/harness-host ci

      - name: Build runtime harness host
        run: npm --prefix runtime/harness-host run build

      - name: Runtime state store tests
        run: npm run runtime:state-store:test

      - name: Runtime harness host tests
        run: npm run runtime:harness-host:test

  runtime-api-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            runtime/api-server/package-lock.json
            runtime/state-store/package-lock.json

      - name: Install runtime API server dependencies
        run: npm --prefix runtime/api-server ci

      - name: Install runtime state store dependencies
        run: npm --prefix runtime/state-store ci

      - name: Build runtime state store
        run: npm --prefix runtime/state-store run build

      - name: Runtime API server typecheck
        run: npm --prefix runtime/api-server run typecheck

      - name: Runtime API server tests
        run: |
          set -euo pipefail
          cd runtime/api-server
          node --import tsx --test --test-concurrency=1 --test-shard=1/2 src/**/*.test.ts &
          shard_one_pid=$!
          node --import tsx --test --test-concurrency=1 --test-shard=2/2 src/**/*.test.ts &
          shard_two_pid=$!
          wait "$shard_one_pid"
          wait "$shard_two_pid"

      - name: Runtime API server build
        run: npm --prefix runtime/api-server run build
