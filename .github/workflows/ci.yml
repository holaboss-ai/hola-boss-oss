name: CI

on:
  pull_request:
    paths-ignore:
      - .github/workflows/deploy-docs.yml
      - website/docs/**
  push:
    branches:
      - main
    paths-ignore:
      - .github/workflows/deploy-docs.yml
      - website/docs/**
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release
        required: true
        default: main
        type: string
      release_tag:
        description: GitHub release tag to create or update
        required: true
        type: string
      release_title:
        description: Optional GitHub release title (defaults to the tag)
        required: false
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease when first created
        required: true
        default: false
        type: boolean
      release_channel:
        description: Auto-update channel to publish for desktop clients
        required: true
        default: latest
        type: choice
        options:
          - latest
          - beta
      release_windows:
        description: Build and publish the Windows desktop installer
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  desktop-typecheck:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sdk/app-sdk/package-lock.json
            desktop/package-lock.json

      - name: Prepare desktop (build SDK + install desktop deps)
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm run desktop:prepare

      - name: Desktop typecheck
        run: npm run desktop:typecheck

  runtime-tests:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            runtime/harness-host/package-lock.json
            runtime/state-store/package-lock.json

      - name: Install runtime state store dependencies
        run: npm --prefix runtime/state-store ci

      - name: Build runtime state store
        run: npm --prefix runtime/state-store run build

      - name: Install runtime harness host dependencies
        run: npm --prefix runtime/harness-host ci

      - name: Build runtime harness host
        run: npm --prefix runtime/harness-host run build

      - name: Runtime state store tests
        run: npm run runtime:state-store:test

      - name: Runtime harness host tests
        run: npm run runtime:harness-host:test

  sdk-bridge:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --cwd sdk/bridge

      - name: Run tests
        run: bun --cwd sdk/bridge run test

      - name: Build
        run: bun --cwd sdk/bridge run build

  sdk-app-sdk:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sdk/app-sdk/package-lock.json

      - name: Install dependencies
        run: npm --prefix sdk/app-sdk install

      - name: Typecheck
        run: npm --prefix sdk/app-sdk run typecheck

      - name: Run tests
        run: npm --prefix sdk/app-sdk run test

      - name: Build
        run: npm --prefix sdk/app-sdk run build

  runtime-api-server:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            runtime/api-server/package-lock.json
            runtime/state-store/package-lock.json

      - name: Install runtime API server dependencies
        run: npm --prefix runtime/api-server ci

      - name: Install runtime state store dependencies
        run: npm --prefix runtime/state-store ci

      - name: Build runtime state store
        run: npm --prefix runtime/state-store run build

      - name: Runtime API server typecheck
        run: npm --prefix runtime/api-server run typecheck

      - name: Runtime API server tests
        run: npm --prefix runtime/api-server run test

      - name: Runtime API server build
        run: npm --prefix runtime/api-server run build

  ensure-release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.release_meta.outputs.release_ref }}
      release_sha: ${{ steps.release_meta.outputs.release_sha }}
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      release_title: ${{ steps.release_meta.outputs.release_title }}
      release_channel: ${{ steps.release_meta.outputs.release_channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Compute release metadata
        id: release_meta
        run: |
          release_tag="${{ inputs.release_tag }}"
          if ! printf '%s' "${release_tag}" | grep -Eq '^holaboss-desktop-[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "release_tag must match holaboss-desktop-YYYY.MDD.R; got ${release_tag}" >&2
            exit 1
          fi

          release_version="${release_tag#holaboss-desktop-}"
          release_title="${{ inputs.release_title }}"
          release_channel="${{ inputs.release_channel }}"
          if [ -z "${release_title}" ]; then
            release_title="Holaboss ${release_version}"
          fi
          if [ "${release_channel}" != "latest" ] && [ "${release_channel}" != "beta" ]; then
            echo "release_channel must be one of: latest, beta; got ${release_channel}" >&2
            exit 1
          fi
          if [ "${release_channel}" = "beta" ] && [ "${{ inputs.prerelease }}" != "true" ]; then
            echo "beta channel releases must be marked as prerelease" >&2
            exit 1
          fi
          if [ "${release_channel}" = "latest" ] && [ "${{ inputs.prerelease }}" = "true" ]; then
            echo "latest channel releases must not be marked as prerelease" >&2
            exit 1
          fi

          {
            echo "release_ref=${{ inputs.ref }}"
            echo "release_sha=$(git rev-parse HEAD)"
            echo "release_tag=${release_tag}"
            echo "release_title=${release_title}"
            echo "release_channel=${release_channel}"
          } >> "${GITHUB_OUTPUT}"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release_meta.outputs.release_sha }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.release_title }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          notes_path="$(mktemp)"
          trap 'rm -f "${notes_path}"' EXIT

          existing_tag_sha="$(git rev-list -n1 "${RELEASE_TAG}" 2>/dev/null || true)"
          if [ -n "${existing_tag_sha}" ] && [ "${existing_tag_sha}" != "${RELEASE_SHA}" ]; then
            echo "release tag ${RELEASE_TAG} already points to ${existing_tag_sha}, not ${RELEASE_SHA}" >&2
            exit 1
          fi

          generate_notes_args=(
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes"
            --method POST
            -f "tag_name=${RELEASE_TAG}"
            -f "target_commitish=${RELEASE_SHA}"
          )

          if ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
              --method POST \
              -f "ref=refs/tags/${RELEASE_TAG}" \
              -f "sha=${RELEASE_SHA}" >/dev/null
          fi

          gh api "${generate_notes_args[@]}" --jq '.body' > "${notes_path}"

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            prerelease_flag=()
            if [ "${PRERELEASE}" = "true" ]; then
              prerelease_flag+=(--prerelease)
            fi

            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${notes_path}" \
              --draft \
              "${prerelease_flag[@]}"
          else
            prerelease_flag=()
            if [ "${PRERELEASE}" = "true" ]; then
              prerelease_flag+=(--prerelease)
            fi
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${notes_path}" \
              --draft \
              "${prerelease_flag[@]}"
          fi

  build-linux-runtime:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: ensure-release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
      RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      HOLABOSS_RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      RUNTIME_ASSET_NAME: holaboss-runtime-linux.tar.gz
      TOOLCHAIN_ASSET_NAME: holaboss-toolchain-linux.tar.gz
      RUNTIME_ARTIFACT_NAME: holaboss-runtime-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.ensure-release.outputs.release_ref }}

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build Linux runtime bundle
        run: bash runtime/deploy/package_linux_runtime.sh out/runtime-linux

      - name: Upload runtime Sentry source maps
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: holaboss-runtime
        run: |
          npx @sentry/cli sourcemaps upload \
            --release "${{ env.RELEASE_TAG }}" \
            --url-prefix "~/" \
            runtime/api-server/dist

      - name: Archive Linux runtime bundle
        run: tar -C out -czf "out/${RUNTIME_ASSET_NAME}" runtime-linux

      - name: Archive Linux toolchain bundle
        run: tar -C out/runtime-linux -czf "out/${TOOLCHAIN_ASSET_NAME}" package-metadata.json node-runtime python-runtime

      - name: Upload Linux runtime bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.RUNTIME_ARTIFACT_NAME }}-${{ inputs.release_tag }}
          path: |
            out/${{ env.RUNTIME_ASSET_NAME }}
            out/${{ env.TOOLCHAIN_ASSET_NAME }}
            out/runtime-linux/package-metadata.json
            out/runtime-linux/runtime/metadata.json
          if-no-files-found: error

      - name: Upload Linux runtime release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${RELEASE_TAG}" "out/${RUNTIME_ASSET_NAME}" --clobber

      - name: Upload Linux toolchain release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${RELEASE_TAG}" "out/${TOOLCHAIN_ASSET_NAME}" --clobber

  release-macos-desktop:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: ensure-release
    permissions:
      contents: write
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
      RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      HOLABOSS_RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      RUNTIME_ASSET_NAME: holaboss-runtime-macos.tar.gz
      TOOLCHAIN_ASSET_NAME: holaboss-toolchain-macos.tar.gz
      DESKTOP_ASSET_PREFIX: holaboss-desktop-macos
      DESKTOP_RELEASE_ASSET_NAME: Holaboss-macos-arm64.dmg
      MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
      MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.ensure-release.outputs.release_ref }}

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sdk/app-sdk/package-lock.json
            desktop/package-lock.json

      - name: Build macOS runtime bundle
        run: bash runtime/deploy/package_macos_runtime.sh out/runtime-macos

      - name: Upload runtime Sentry source maps
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: holaboss-runtime
        run: |
          npx @sentry/cli sourcemaps upload \
            --release "${{ env.RELEASE_TAG }}" \
            --url-prefix "~/" \
            runtime/api-server/dist

      - name: Archive macOS runtime bundle
        run: tar -C out -czf "out/${RUNTIME_ASSET_NAME}" runtime-macos

      - name: Archive macOS toolchain bundle
        run: tar -C out/runtime-macos -czf "out/${TOOLCHAIN_ASSET_NAME}" package-metadata.json node-runtime python-runtime

      - name: Upload macOS runtime release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${RELEASE_TAG}" "out/${RUNTIME_ASSET_NAME}" --clobber

      - name: Upload macOS toolchain release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${RELEASE_TAG}" "out/${TOOLCHAIN_ASSET_NAME}" --clobber

      - name: Prepare desktop (build SDK + install desktop deps)
        run: npm run desktop:prepare

      - name: Require mac signing and notarization credentials
        run: |
          missing=()
          [ -n "${MAC_CERTIFICATE}" ] || missing+=("MAC_CERTIFICATE")
          [ -n "${MAC_CERTIFICATE_PASSWORD}" ] || missing+=("MAC_CERTIFICATE_PASSWORD")
          [ -n "${APPLE_ID}" ] || missing+=("APPLE_ID")
          [ -n "${APPLE_APP_SPECIFIC_PASSWORD}" ] || missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [ -n "${APPLE_TEAM_ID}" ] || missing+=("APPLE_TEAM_ID")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "missing required mac release secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Build signed macOS app bundle
        id: build_signed_app
        working-directory: desktop
        shell: bash
        env:
          HOLABOSS_RELEASE_TAG: ${{ env.RELEASE_TAG }}
          HOLABOSS_RUNTIME_TARBALL: ${{ github.workspace }}/out/${{ env.RUNTIME_ASSET_NAME }}
          HOLABOSS_AUTH_BASE_URL: ${{ vars.HOLABOSS_AUTH_BASE_URL }}
          HOLABOSS_AUTH_SIGN_IN_URL: ${{ vars.HOLABOSS_AUTH_SIGN_IN_URL }}
          HOLABOSS_BACKEND_BASE_URL: ${{ vars.HOLABOSS_BACKEND_BASE_URL }}
          HOLABOSS_DESKTOP_CONTROL_PLANE_BASE_URL: ${{ vars.HOLABOSS_DESKTOP_CONTROL_PLANE_BASE_URL }}
          HOLABOSS_PROJECTS_URL: ${{ vars.HOLABOSS_PROJECTS_URL }}
          HOLABOSS_MARKETPLACE_URL: ${{ vars.HOLABOSS_MARKETPLACE_URL }}
          HOLABOSS_PROACTIVE_URL: ${{ vars.HOLABOSS_PROACTIVE_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GITHUB_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ env.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ env.MAC_CERTIFICATE_PASSWORD }}
        run: |
          soft_limit="$(ulimit -Sn)"
          hard_limit="$(ulimit -Hn)"
          echo "open file limits before build: soft=${soft_limit} hard=${hard_limit}"
          target_limit=65536
          if [ "${hard_limit}" != "unlimited" ] && [ "${hard_limit}" -lt "${target_limit}" ]; then
            target_limit="${hard_limit}"
          fi
          if [ "${soft_limit}" -lt "${target_limit}" ]; then
            ulimit -n "${target_limit}" || true
          fi
          echo "open file limits for build: soft=$(ulimit -Sn) hard=$(ulimit -Hn)"
          npm run prepare:runtime
          npm run prepare:packaged-config
          npm run build
          rm -rf out/release
          node scripts/run-electron-builder.mjs \
            --projectDir "$PWD" \
            --publish never \
            --mac dir \
            --arm64 \
            --config.mac.notarize=false
          app_path="$(find out/release -maxdepth 2 -name '*.app' -print -quit)"
          if [ -z "${app_path}" ]; then
            echo "no .app bundle found under desktop/out/release" >&2
            exit 1
          fi
          app_path="$(cd "$(dirname "${app_path}")" && pwd)/$(basename "${app_path}")"
          if [ ! -f "${app_path}/Contents/Resources/app-update.yml" ]; then
            echo "app-update.yml is missing from signed macOS app bundle" >&2
            exit 1
          fi
          echo "app_path=${app_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload desktop Sentry source maps
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        working-directory: desktop
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: holaboss-desktop
        run: |
          npx @sentry/cli sourcemaps upload \
            --release "${{ env.RELEASE_TAG }}" \
            --url-prefix "~/" \
            out/dist out/dist-electron

      - name: Validate signed macOS app bundle
        working-directory: desktop
        run: |
          app_path="${{ steps.build_signed_app.outputs.app_path }}"
          if [ -z "${app_path}" ] || [ ! -d "${app_path}" ]; then
            echo "signed app bundle was not produced or no longer exists: ${app_path}" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "${app_path}"

      - name: Notarize signed macOS app bundle
        working-directory: desktop
        shell: bash
        run: |
          app_path="${{ steps.build_signed_app.outputs.app_path }}"
          if [ -z "${app_path}" ] || [ ! -d "${app_path}" ]; then
            echo "signed app bundle was not produced correctly: ${app_path}" >&2
            exit 1
          fi
          max_attempts=3
          attempt=1
          while true; do
            log_path="${RUNNER_TEMP}/notarize-app-attempt-${attempt}.log"
            echo "notarization attempt ${attempt}/${max_attempts}"

            if node scripts/notarize-app.mjs "${app_path}" 2>&1 | tee "${log_path}"; then
              break
            fi

            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "notarization failed after ${attempt} attempts" >&2
              exit 1
            fi

            if ! grep -Fq "Failed to notarize via notarytool" "${log_path}"; then
              echo "notarization failed with a non-notarytool error; not retrying" >&2
              exit 1
            fi

            if ! grep -Eq \
              'The Internet connection appears to be offline|NSURLErrorDomain Code=-1009|network connection was lost|timed out|temporarily unavailable|could not connect to the server|A server with the specified hostname could not be found' \
              "${log_path}"; then
              echo "notarization failed with a non-retryable error; not retrying" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 60))
            echo "transient notarization failure detected; retrying after ${sleep_seconds}s" >&2
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Validate notarized macOS app bundle
        shell: bash
        run: |
          app_path="${{ steps.build_signed_app.outputs.app_path }}"
          if [ -z "${app_path}" ] || [ ! -d "${app_path}" ]; then
            echo "notarized app bundle was not produced: ${app_path}" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "${app_path}"
          spctl -a -vv -t exec "${app_path}"
          xcrun stapler validate "${app_path}"

      - name: Build macOS desktop release artifacts from notarized app bundle
        working-directory: desktop
        shell: bash
        env:
          HOLABOSS_RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          app_path="${{ steps.build_signed_app.outputs.app_path }}"
          if [ -z "${app_path}" ] || [ ! -d "${app_path}" ]; then
            echo "notarized app bundle was not produced correctly: ${app_path}" >&2
            exit 1
          fi
          prepackaged_app="${RUNNER_TEMP}/Holaboss.app"
          rm -rf "${prepackaged_app}"
          ditto "${app_path}" "${prepackaged_app}"
          rm -rf out/release
          node scripts/run-electron-builder.mjs \
            --projectDir "$PWD" \
            --publish never \
            --prepackaged "${prepackaged_app}" \
            --mac dmg zip \
            --arm64 \
            --config.mac.notarize=false

      - name: Validate macOS auto-update artifacts
        shell: bash
        run: |
          primary_channel="${RELEASE_CHANNEL:-latest}"
          if [ "${primary_channel}" = "beta" ]; then
            primary_manifest_name="beta-mac.yml"
          else
            primary_manifest_name="latest-mac.yml"
          fi
          dmg_path="$(find desktop/out/release -maxdepth 1 -name '*.dmg' -print -quit)"
          zip_path="$(find desktop/out/release -maxdepth 1 -name '*.zip' ! -name '*.blockmap' -print -quit)"
          manifest_path="desktop/out/release/${primary_manifest_name}"
          if [ -z "${dmg_path}" ]; then
            echo "no DMG found in desktop/out/release" >&2
            exit 1
          fi
          if [ -z "${zip_path}" ]; then
            echo "no macOS zip found in desktop/out/release" >&2
            exit 1
          fi
          if [ ! -f "${manifest_path}" ]; then
            echo "${primary_manifest_name} was not generated" >&2
            exit 1
          fi
          if [ "${primary_channel}" = "latest" ]; then
            beta_manifest_path="desktop/out/release/beta-mac.yml"
            cp "${manifest_path}" "${beta_manifest_path}"
            if [ ! -f "${beta_manifest_path}" ]; then
              echo "beta-mac.yml was not generated for stable-channel compatibility" >&2
              exit 1
            fi
          fi
          if ! zipinfo -1 "${zip_path}" | grep -Eq '^Holaboss\.app/'; then
            echo "macOS zip does not contain Holaboss.app as the root app bundle" >&2
            exit 1
          fi
          if ! zipinfo -1 "${zip_path}" | grep -Fxq 'Holaboss.app/Contents/Resources/app-update.yml'; then
            echo "app-update.yml is missing from final macOS zip" >&2
            exit 1
          fi
          extract_dir="${RUNNER_TEMP}/mac-zip-signature-verify"
          rm -rf "${extract_dir}"
          mkdir -p "${extract_dir}"
          ditto -x -k "${zip_path}" "${extract_dir}"
          extracted_app="${extract_dir}/Holaboss.app"
          if [ ! -d "${extracted_app}" ]; then
            echo "Holaboss.app was not extracted from the final macOS zip" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "${extracted_app}"
          spctl -a -vv -t exec "${extracted_app}"
          xcrun stapler validate "${extracted_app}"

      - name: Upload macOS desktop release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DESKTOP_ASSET_PREFIX }}-${{ inputs.release_tag }}
          path: |
            desktop/out/release/*.dmg
            desktop/out/release/*.zip
            desktop/out/release/*.blockmap
            desktop/out/release/*-mac.yml
          if-no-files-found: error

      - name: Upload macOS desktop release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dmg_path="$(find desktop/out/release -maxdepth 1 -name '*.dmg' -print -quit)"
          zip_path="$(find desktop/out/release -maxdepth 1 -name '*.zip' ! -name '*.blockmap' -print -quit)"
          stable_path="desktop/out/release/${DESKTOP_RELEASE_ASSET_NAME}"
          cp "${dmg_path}" "${stable_path}"
          upload_paths=(
            "${stable_path}"
            "${zip_path}"
          )
          while IFS= read -r manifest_path; do
            upload_paths+=("${manifest_path}")
          done < <(find desktop/out/release -maxdepth 1 -name '*-mac.yml' -print | sort)
          while IFS= read -r blockmap_path; do
            upload_paths+=("${blockmap_path}")
          done < <(find desktop/out/release -maxdepth 1 -name '*.blockmap' -print)
          gh release upload "${RELEASE_TAG}" \
            "${upload_paths[@]}" \
            --clobber

  verify-macos-release-assets:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs:
      - ensure-release
      - release-macos-desktop
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
      RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      HOLABOSS_RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
    steps:
      - name: Verify release remains draft before publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          is_draft="$(gh release view "${RELEASE_TAG}" --json isDraft --jq '.isDraft')"
          if [ "${is_draft}" != "true" ]; then
            echo "release ${RELEASE_TAG} must remain a draft until asset verification succeeds" >&2
            exit 1
          fi

      - name: Download published macOS release assets from GitHub
        id: download_published_assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          verify_dir="${RUNNER_TEMP}/mac-release-verify"
          rm -rf "${verify_dir}"
          mkdir -p "${verify_dir}"
          primary_channel="${RELEASE_CHANNEL:-latest}"
          if [ "${primary_channel}" = "beta" ]; then
            primary_manifest_name="beta-mac.yml"
          else
            primary_manifest_name="latest-mac.yml"
          fi
          gh release download "${RELEASE_TAG}" \
            --dir "${verify_dir}" \
            --pattern 'Holaboss-*-arm64-mac.zip' \
            --pattern "${primary_manifest_name}" \
            --clobber
          if [ "${primary_channel}" = "latest" ]; then
            gh release download "${RELEASE_TAG}" \
              --dir "${verify_dir}" \
              --pattern 'beta-mac.yml' \
              --clobber
          fi
          zip_path="$(find "${verify_dir}" -maxdepth 1 -name 'Holaboss-*-arm64-mac.zip' -print -quit)"
          manifest_path="${verify_dir}/${primary_manifest_name}"
          if [ -z "${zip_path}" ] || [ ! -f "${zip_path}" ]; then
            echo "failed to download the published macOS zip asset from GitHub" >&2
            exit 1
          fi
          if [ ! -f "${manifest_path}" ]; then
            echo "failed to download ${primary_manifest_name} from GitHub" >&2
            exit 1
          fi
          if [ "${primary_channel}" = "latest" ] && [ ! -f "${verify_dir}/beta-mac.yml" ]; then
            echo "failed to download beta-mac.yml from GitHub" >&2
            exit 1
          fi
          {
            echo "zip_path=${zip_path}"
            echo "manifest_path=${manifest_path}"
            echo "verify_dir=${verify_dir}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate downloaded macOS release assets
        shell: bash
        run: |
          zip_path="${{ steps.download_published_assets.outputs.zip_path }}"
          manifest_path="${{ steps.download_published_assets.outputs.manifest_path }}"
          verify_dir="${{ steps.download_published_assets.outputs.verify_dir }}"
          primary_channel="${RELEASE_CHANNEL:-latest}"
          if ! zipinfo -1 "${zip_path}" | grep -Eq '^Holaboss\.app/'; then
            echo "published macOS zip does not contain Holaboss.app as the root app bundle" >&2
            exit 1
          fi
          if ! zipinfo -1 "${zip_path}" | grep -Fxq 'Holaboss.app/Contents/Resources/app-update.yml'; then
            echo "published macOS zip is missing Holaboss.app/Contents/Resources/app-update.yml" >&2
            exit 1
          fi

          ruby "${zip_path}" "${manifest_path}" "${verify_dir}/beta-mac.yml" "${primary_channel}" <<'RUBY'
          require "yaml"

          zip_path = ARGV.fetch(0)
          manifest_path = ARGV.fetch(1)
          beta_manifest_path = ARGV.fetch(2)
          primary_channel = ARGV.fetch(3)
          zip_basename = File.basename(zip_path)

          app_update_yaml = IO.popen(["unzip", "-p", zip_path, "Holaboss.app/Contents/Resources/app-update.yml"], &:read)
          raise "unable to read app-update.yml from #{zip_basename}" if app_update_yaml.nil? || app_update_yaml.strip.empty?

          app_update = YAML.safe_load(app_update_yaml, permitted_classes: [], aliases: false)
          raise "app-update provider is not github" unless app_update["provider"] == "github"
          raise "app-update owner is not holaboss-ai" unless app_update["owner"] == "holaboss-ai"
          raise "app-update repo is not holaOS" unless app_update["repo"] == "holaOS"
          raise "unexpected updater cache dir #{app_update["updaterCacheDirName"].inspect}" unless app_update["updaterCacheDirName"] == "holaboss-local-updater"

          latest_manifest = YAML.safe_load(File.read(manifest_path), permitted_classes: [], aliases: false)
          raise "latest-mac.yml path does not match uploaded zip" unless latest_manifest["path"] == zip_basename

          files = latest_manifest["files"]
          if files.is_a?(Array) && !files.empty?
            unless files.any? { |entry| entry.is_a?(Hash) && entry["url"] == zip_basename }
              raise "latest-mac.yml files[] does not reference #{zip_basename}"
            end
          end

          if primary_channel == "latest"
            raise "beta-mac.yml was not downloaded alongside the stable release" unless File.exist?(beta_manifest_path)
            beta_manifest = YAML.safe_load(File.read(beta_manifest_path), permitted_classes: [], aliases: false)
            raise "beta-mac.yml path does not match uploaded zip" unless beta_manifest["path"] == zip_basename
            beta_files = beta_manifest["files"]
            if beta_files.is_a?(Array) && !beta_files.empty?
              unless beta_files.any? { |entry| entry.is_a?(Hash) && entry["url"] == zip_basename }
                raise "beta-mac.yml files[] does not reference #{zip_basename}"
              end
            end
          end
          RUBY

  release-windows-desktop:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_windows }}
    needs: ensure-release
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
      RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      HOLABOSS_RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      DESKTOP_ASSET_PREFIX: holaboss-desktop-windows
      DESKTOP_RELEASE_ASSET_NAME: Holaboss-windows-x64-setup.exe
      RUNTIME_ASSET_NAME: holaboss-runtime-windows.tar.gz
      TOOLCHAIN_ASSET_NAME: holaboss-toolchain-windows.tar.gz
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.ensure-release.outputs.release_ref }}

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sdk/app-sdk/package-lock.json
            desktop/package-lock.json

      - name: Prepare desktop (build SDK + install desktop deps)
        run: npm run desktop:prepare

      - name: Build Windows desktop installer
        id: build_windows_installer
        working-directory: desktop
        shell: pwsh
        env:
          HOLABOSS_RELEASE_TAG: ${{ env.RELEASE_TAG }}
          HOLABOSS_AUTH_BASE_URL: ${{ vars.HOLABOSS_AUTH_BASE_URL }}
          HOLABOSS_AUTH_SIGN_IN_URL: ${{ vars.HOLABOSS_AUTH_SIGN_IN_URL }}
          HOLABOSS_BACKEND_BASE_URL: ${{ vars.HOLABOSS_BACKEND_BASE_URL }}
          HOLABOSS_DESKTOP_CONTROL_PLANE_BASE_URL: ${{ vars.HOLABOSS_DESKTOP_CONTROL_PLANE_BASE_URL }}
          HOLABOSS_PROJECTS_URL: ${{ vars.HOLABOSS_PROJECTS_URL }}
          HOLABOSS_MARKETPLACE_URL: ${{ vars.HOLABOSS_MARKETPLACE_URL }}
          HOLABOSS_PROACTIVE_URL: ${{ vars.HOLABOSS_PROACTIVE_URL }}
          GITHUB_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ env.WINDOWS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ env.WINDOWS_CERTIFICATE_PASSWORD }}
          WIN_CSC_LINK: ${{ env.WINDOWS_CERTIFICATE }}
          WIN_CSC_KEY_PASSWORD: ${{ env.WINDOWS_CERTIFICATE_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw "Windows desktop release requires WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD so the public installer is code-signed."
          }

          Write-Host "Building signed Windows installer."

          npm run dist:win:local

          $installer = Get-ChildItem -Path out/release -File -Recurse |
            Where-Object {
              $_.Extension -eq ".exe" -and
              $_.Name -notmatch "unins|elevate" -and
              $_.FullName -notmatch "win-unpacked"
            } |
            Sort-Object Length -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "No Windows installer .exe was produced under desktop/out/release."
          }

          if (-not (Test-Path -LiteralPath (Join-Path $PWD "out/runtime-windows"))) {
            throw "No staged Windows runtime bundle was produced under desktop/out/runtime-windows."
          }

          tar -C out -czf "out/$env:RUNTIME_ASSET_NAME" runtime-windows
          tar -C out/runtime-windows -czf "out/$env:TOOLCHAIN_ASSET_NAME" package-metadata.json node-runtime python-runtime

          $installerPath = $installer.FullName
          $stablePath = Join-Path $PWD "out/release/$env:DESKTOP_RELEASE_ASSET_NAME"
          $runtimeAssetPath = Join-Path $PWD "out/$env:RUNTIME_ASSET_NAME"
          $toolchainAssetPath = Join-Path $PWD "out/$env:TOOLCHAIN_ASSET_NAME"
          Copy-Item -LiteralPath $installerPath -Destination $stablePath -Force
          Add-Content -Path $env:GITHUB_OUTPUT -Value "generated_installer_path=$installerPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "installer_path=$stablePath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "runtime_asset_path=$runtimeAssetPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "toolchain_asset_path=$toolchainAssetPath"

      - name: Upload desktop Sentry source maps
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        working-directory: desktop
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: holaboss-desktop
        run: |
          npx @sentry/cli sourcemaps upload \
            --release "${{ env.RELEASE_TAG }}" \
            --url-prefix "~/" \
            out/dist out/dist-electron

      - name: Validate Windows auto-update artifacts
        shell: pwsh
        run: |
          $primaryChannel = if ($env:RELEASE_CHANNEL) { $env:RELEASE_CHANNEL } else { "latest" }
          $manifestName = if ($primaryChannel -eq "beta") { "beta.yml" } else { "latest.yml" }
          $manifestPath = Join-Path $PWD "desktop/out/release/$manifestName"
          if (-not (Test-Path -LiteralPath $manifestPath)) {
            throw "$manifestName was not generated"
          }

          if ($primaryChannel -eq "latest") {
            $betaManifestPath = Join-Path $PWD "desktop/out/release/beta.yml"
            Copy-Item -LiteralPath $manifestPath -Destination $betaManifestPath -Force
            if (-not (Test-Path -LiteralPath $betaManifestPath)) {
              throw "beta.yml was not generated for stable-channel compatibility"
            }
          }

          $blockmaps = Get-ChildItem -Path desktop/out/release -File -Filter *.blockmap
          if (-not $blockmaps) {
            throw "No Windows blockmap was produced under desktop/out/release."
          }

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DESKTOP_ASSET_PREFIX }}-${{ inputs.release_tag }}
          path: |
            desktop/out/release/*.exe
            desktop/out/release/*.yml
            desktop/out/release/*.blockmap
            desktop/out/${{ env.RUNTIME_ASSET_NAME }}
            desktop/out/${{ env.TOOLCHAIN_ASSET_NAME }}
            desktop/out/runtime-windows/package-metadata.json
            desktop/out/runtime-windows/runtime/metadata.json
          if-no-files-found: error

      - name: Upload Windows release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GENERATED_INSTALLER_PATH: ${{ steps.build_windows_installer.outputs.generated_installer_path }}
          INSTALLER_PATH: ${{ steps.build_windows_installer.outputs.installer_path }}
          RUNTIME_ASSET_PATH: ${{ steps.build_windows_installer.outputs.runtime_asset_path }}
          TOOLCHAIN_ASSET_PATH: ${{ steps.build_windows_installer.outputs.toolchain_asset_path }}
        run: |
          if (-not $env:INSTALLER_PATH) {
            throw "Installer path output was not set."
          }

          if (-not $env:GENERATED_INSTALLER_PATH) {
            throw "Generated installer path output was not set."
          }

          if (-not $env:RUNTIME_ASSET_PATH) {
            throw "Runtime asset path output was not set."
          }

          if (-not $env:TOOLCHAIN_ASSET_PATH) {
            throw "Toolchain asset path output was not set."
          }

          $uploadPaths = @($env:INSTALLER_PATH)
          if ($env:GENERATED_INSTALLER_PATH -ne $env:INSTALLER_PATH) {
            $uploadPaths += $env:GENERATED_INSTALLER_PATH
          }
          $manifestPaths = Get-ChildItem -Path desktop/out/release -File -Filter *.yml |
            ForEach-Object { $_.FullName }
          if (-not $manifestPaths) {
            throw "No Windows update manifest was produced under desktop/out/release."
          }
          $uploadPaths += $manifestPaths
          $uploadPaths += $env:RUNTIME_ASSET_PATH
          $uploadPaths += $env:TOOLCHAIN_ASSET_PATH

          $blockmapPaths = Get-ChildItem -Path desktop/out/release -File -Filter *.blockmap |
            ForEach-Object { $_.FullName }
          if (-not $blockmapPaths) {
            throw "No Windows blockmap was produced under desktop/out/release."
          }
          $uploadPaths += $blockmapPaths

          gh release upload $env:RELEASE_TAG @uploadPaths --clobber

  publish-release:
    if: >-
      ${{
        always() &&
        github.event_name == 'workflow_dispatch' &&
        needs.ensure-release.result == 'success' &&
        needs.build-linux-runtime.result == 'success' &&
        needs.release-macos-desktop.result == 'success' &&
        needs.verify-macos-release-assets.result == 'success' &&
        (needs.release-windows-desktop.result == 'success' || needs.release-windows-desktop.result == 'skipped')
      }}
    needs:
      - ensure-release
      - build-linux-runtime
      - release-macos-desktop
      - verify-macos-release-assets
      - release-windows-desktop
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
      RELEASE_TITLE: ${{ needs.ensure-release.outputs.release_title }}
      RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      HOLABOSS_RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      PRERELEASE: ${{ inputs.prerelease }}
    steps:
      - name: Publish verified GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=()
          if [ "${PRERELEASE}" = "true" ]; then
            prerelease_flag+=(--prerelease)
          fi
          gh release edit "${RELEASE_TAG}" \
            --title "${RELEASE_TITLE}" \
            --draft=false \
            "${prerelease_flag[@]}"
